# docker-compose.yml
# VeriChain AI — Complete System Orchestration
# Network topology:
#   public_net: Gateway, Trust Dashboard, Nginx
#   internal_net: AI Engine, MongoDB, Redis, Blockchain
#   Gateway bridges BOTH networks

version: '3.9'

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  internal_net:
    driver: bridge
    internal: true  # CRITICAL: no external routing
    ipam:
      config:
        - subnet: 172.21.0.0/24

volumes:
  mongodb_data:
  redis_data:
  blockchain_data:

services:
  # ── Nginx reverse proxy (SSL termination) ────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - public_net
    depends_on:
      - gateway
      - trust-dashboard
    restart: unless-stopped

  # ── Security Gateway (sole public entry point) ───────────────────
  gateway:
    build: ./packages/gateway
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=${GATEWAY_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC}
      - ACCESS_POLICY_ADDRESS=${ACCESS_POLICY_ADDRESS}
      - AUDIT_LEDGER_ADDRESS=${AUDIT_LEDGER_ADDRESS}
      - GATEWAY_PRIVATE_KEY=${GATEWAY_PRIVATE_KEY}
      - AI_ENGINE_URL=http://ai-engine:5001
      - AI_HMAC_SECRET=${AI_HMAC_SECRET}
      - GATEWAY_CERT_PIN=${GATEWAY_CERT_PIN}
      - JWT_SECRET=${JWT_SECRET}
      - DESKTOP_AGENT_ORIGIN=${DESKTOP_AGENT_ORIGIN}
      - TRUST_DASHBOARD_ORIGIN=${TRUST_DASHBOARD_ORIGIN}
    volumes:
      - ./certs:/app/certs:ro
      - ./packages/gateway/logs:/app/logs
    networks:
      - public_net
      - internal_net   # Gateway bridges both networks
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      blockchain:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── AI Risk Engine (INTERNAL ONLY — no public exposure) ──────────
  ai-engine:
    build: ./packages/ai-engine
    environment:
      - AI_HMAC_SECRET=${AI_HMAC_SECRET}
      - BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC}
      - ACCESS_POLICY_ADDRESS=${ACCESS_POLICY_ADDRESS}
      - ENVIRONMENT=${ENVIRONMENT}
    networks:
      - internal_net   # INTERNAL ONLY — never on public_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Hardhat Blockchain Node ───────────────────────────────────────
  blockchain:
    build: ./packages/contracts
    command: ["npx", "hardhat", "node", "--hostname", "0.0.0.0"]
    networks:
      - internal_net
    volumes:
      - blockchain_data:/app/blockchain_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MongoDB (INTERNAL ONLY) ──────────────────────────────────────
  mongodb:
    image: mongo:7.0
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=verichain
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - internal_net   # INTERNAL ONLY
    restart: unless-stopped
    command: ["mongod", "--auth", "--bind_ip", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis (nonce store + session store, INTERNAL ONLY) ───────────
  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal_net   # INTERNAL ONLY
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Trust Dashboard (Admin web UI) ───────────────────────────────
  trust-dashboard:
    build: ./packages/trust-dashboard
    environment:
      - REACT_APP_GATEWAY_URL=${REACT_APP_GATEWAY_URL}
      - REACT_APP_WS_URL=${REACT_APP_WS_URL}
    networks:
      - public_net
    restart: unless-stopped
