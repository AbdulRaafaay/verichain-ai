# VeriChain AI — Infrastructure-Only Compose File
# This compose file starts ONLY the stateful infrastructure services that the
# gateway, desktop-agent, and trust-dashboard need to talk to.
#
# The application processes themselves (gateway, dashboard, electron app) are
# launched directly on the host by `start-all.ps1` so they can read TLS certs
# from ./certs/ and run with hot-reload during development.

networks:
  internal_net:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:

services:
  # ── AI Risk Engine ────────────────────────────────────────────────────────
  ai-engine:
    build: ./packages/ai-engine
    environment:
      - AI_HMAC_SECRET=${AI_HMAC_SECRET}
      - BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC}
      - ACCESS_POLICY_ADDRESS=${ACCESS_POLICY_ADDRESS}
    ports:
      - "5001:5001"
    networks:
      - internal_net
    depends_on:
      blockchain:
        condition: service_started
    healthcheck:
      # python:3.11-slim has no curl — use Python's built-in urllib instead
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5001/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Local Ethereum Node ───────────────────────────────────────────────────
  blockchain:
    build: ./packages/contracts
    ports:
      - "8545:8545"
    networks:
      - internal_net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8545"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MongoDB (audit log durability) ────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    ports:
      - "27020:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    networks:
      - internal_net
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis (sessions + nonces, with keyspace notifications enabled) ────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--notify-keyspace-events", "Ex"]
    environment:
      # REDISCLI_AUTH avoids the "-a flag is unsafe" warning the CLI prints to stderr.
      - REDISCLI_AUTH=${REDIS_PASSWORD}
    networks:
      - internal_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
