# VeriChain AI — Complete System Orchestration
# Network isolation: public_net (Nginx, Dashboard) vs internal_net (Everything else)

version: '3.9'

networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true

volumes:
  mongodb_data:
  redis_data:

services:
  gateway:
    build: ./packages/gateway
    environment:
      - NODE_ENV=${ENVIRONMENT}
      - GATEWAY_PORT=${GATEWAY_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=${REDIS_URL}
      - BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC}
      - ACCESS_POLICY_ADDRESS=${ACCESS_POLICY_ADDRESS}
      - AUDIT_LEDGER_ADDRESS=${AUDIT_LEDGER_ADDRESS}
      - GATEWAY_PRIVATE_KEY=${GATEWAY_PRIVATE_KEY}
      - AI_ENGINE_URL=${AI_ENGINE_URL}
      - AI_HMAC_SECRET=${AI_HMAC_SECRET}
      - HMAC_SECRET=${HMAC_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - DESKTOP_AGENT_ORIGIN=${DESKTOP_AGENT_ORIGIN}
      - TRUST_DASHBOARD_ORIGIN=${TRUST_DASHBOARD_ORIGIN}
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - public_net
      - internal_net
    depends_on:
      - mongodb
      - redis
      - blockchain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-engine:
    build: ./packages/ai-engine
    environment:
      - AI_HMAC_SECRET=${AI_HMAC_SECRET}
      - BLOCKCHAIN_RPC=${BLOCKCHAIN_RPC}
      - ACCESS_POLICY_ADDRESS=${ACCESS_POLICY_ADDRESS}
    networks:
      - internal_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  blockchain:
    build: ./packages/contracts
    command: ["npx", "hardhat", "node", "--hostname", "0.0.0.0"]
    networks:
      - internal_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 15s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    networks:
      - internal_net
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - internal_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  trust-dashboard:
    build: ./packages/trust-dashboard
    environment:
      - REACT_APP_GATEWAY_URL=${REACT_APP_GATEWAY_URL}
      - REACT_APP_WS_URL=${REACT_APP_WS_URL}
    networks:
      - public_net
    ports:
      - "3001:3000"
