name: Security CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Gateway Lint & Audit
        run: |
          cd packages/gateway
          npm install
          npm run lint
          npm audit --audit-level=critical
          
      - name: AI Engine Security Check
        run: |
          cd packages/ai-engine
          pip install flake8 bandit
          flake8 .
          bandit -r .
          
      - name: Compile Smart Contracts
        run: |
          cd packages/contracts
          npm install
          npx hardhat compile

      - name: Smart Contract Security (Slither)
        uses: crytic/slither-action@v0.3.0
        with:
          target: 'packages/contracts'
          ignore-compile: true

  mtls-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Verify Certificate Paths
        run: |
          if [ ! -d "certs" ]; then echo "Security Warning: Certs directory missing"; fi
